http:
  routers:
    grafana:
      rule: 'Host(`{{env "GRAFANA_NAME"}}.{{env "DOMAIN"}}`)'
      entryPoints:
        - "websecure"
      service: grafana
      tls:
        certResolver: letsencrypt
        domains:
          - main: '{{env "DOMAIN"}}'
          - sans: '*.{{env "DOMAIN"}}'

    beszel:
      rule: 'Host(`{{env "BESZEL_NAME"}}.{{env "DOMAIN"}}`)'
      entryPoints:
        - "websecure"
      service: beszel
      tls:
        certResolver: letsencrypt
        domains:
          - main: '{{env "DOMAIN"}}'
          - sans: '*.{{env "DOMAIN"}}'

    beszel:
      rule: 'Host(`{{env "BESZEL_NAME"}}.{{env "DOMAIN"}}`)'
      entryPoints:
        - "websecure"
      service: beszel
      tls:
        certResolver: letsencrypt
        domains:
          - main: '{{env "DOMAIN"}}'
          - sans: '*.{{env "DOMAIN"}}'

  services:
    grafana:
      loadBalancer:
        servers:
          - url: http://{{env "GRAFANA_NAME"}}:{{env "GRAFANA_PORT"}}/

    beszel:
      loadBalancer:
        servers:
          - url: http://{{env "BESZEL_NAME"}}:{{env "BESZEL_PORT"}}/
