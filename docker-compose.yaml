include:
  - path:
    - ./config/docker-compose.yaml
    - ./apps/monitoring/docker-compose.yaml
    - ./apps/media/docker-compose.yaml
    - ./apps/automation/docker-compose.yaml
    - ./apps/management/docker-compose.yaml
    - ./apps/networking/docker-compose.yaml

networks:
  media_network:
    driver: bridge
    
volumes:
  movies:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.0.20,nfsvers=4,rw,soft
      device: ":/mnt/nas/movies"

  shows:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.0.20,nfsvers=4,rw,soft
      device: ":/mnt/nas/tv"

  downloads:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.0.20,nfsvers=4,rw,soft
      device: ":/mnt/nas/downloads"