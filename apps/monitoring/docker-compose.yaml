x-service: &service
  restart: unless-stopped
  networks:
    - media_network

x-user: &user
  <<: *service
  environment:
    - PUID=${USER_ID}
    - PGID=${GROUP_ID}
    - TZ=${TIMEZONE}

services:
  otel-collector:
    <<: *service
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - 4317:4317
      - 4318:4318
      - 8888:8888
      - 9464:9464

  prometheus:
    <<: *service
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus:/prometheus
    ports:
      - 9090:9090

  grafana:
    <<: *service
    image: grafana/grafana:latest
    container_name: ${GRAFANA_NAME}
    ports:
      - ${GRAFANA_PORT}:${GRAFANA_PORT}
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin  # Change this in production!
    volumes:
      - grafana:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/etc/grafana/dashboards

  beszel:
    <<: *service
    image: henrygd/beszel:latest
    container_name: ${BESZEL_NAME}
    # ports:
    #   - ${BESZEL_PORT}:${BESZEL_PORT}
    volumes:
      - ./beszel:/beszel_data
      - ./beszel_socket:/beszel_socket
    environment:
      - APP_URL=https://${BESZEL_NAME}.${DOMAIN}

  beszel-agent:
    <<: *service
    image: henrygd/beszel-agent:latest
    container_name: ${BESZEL_NAME}-agent
    network_mode: host
    networks: []
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./beszel_agent_data:/var/lib/beszel-agent
      - ./beszel_socket:/beszel_socket
    environment:
      - LISTEN=/beszel_socket/beszel.sock
      - KEY=${BESZEL_AGENT_KEY}
      - TOKEN=${BESZEL_AGENT_TOKEN}
      - HUB_URL=https://${BESZEL_NAME}.${DOMAIN}

  exportarr-radarr:
    <<: *service
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-radarr
    command: ["radarr"]
    environment:
      PORT: 9707
      URL: http://radarr:7878
      APIKEY: ${RADARR_API_KEY}

  exportarr-sonarr:
    <<: *service
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-sonarr
    command: ["sonarr"]
    environment:
      PORT: 9708
      URL: http://sonarr:8989
      APIKEY: ${SONARR_API_KEY}

  exportarr-prowlarr:
    <<: *service
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-prowlarr
    command: ["prowlarr", "--backfill", "--backfill-since-date=2025-01-01"]
    environment:
      PORT: 9709
      URL: http://prowlarr:9696
      APIKEY: ${PROWLARR_API_KEY}

  exportarr-bazarr:
    <<: *service
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-bazarr
    command: ["bazarr"]
    environment:
      PORT: 9710
      URL: http://bazarr:6767
      APIKEY: ${BAZARR_API_KEY}

volumes:
  prometheus:
  grafana:
